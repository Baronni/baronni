<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa do Mundo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
.container { background: #16213e; border-radius: 16px; padding: 30px; width: 100%; max-width: 1200px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h1, h2, h3 { color: #e94560; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; margin: 15px 0; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid #0f3460; }
th { background: #0f3460; color: #e94560; }
input, select, button { padding: 10px; border: none; border-radius: 8px; margin: 5px; font-size: 14px; }
input, select { background: #1a1a2e; color: #eee; border: 1px solid #0f3460; width: 100%; }
button { background: #e94560; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
button:hover { background: #c73450; transform: scale(1.02); }
.btn-secondary { background: #0f3460; }
.btn-secondary:hover { background: #1a4a8a; }
.btn-danger { background: #b00; }
.btn-danger:hover { background: #900; }
.btn-success { background: #2ecc71; }
.btn-success:hover { background: #27ae60; }
.tabs { display: flex; gap: 10px; margin-bottom: 20px; }
.tab { padding: 10px 20px; background: #0f3460; cursor: pointer; border-radius: 8px; font-weight: bold; }
.tab.active { background: #e94560; }
.section { display: none; }
.section.active { display: block; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
.card { background: #1a1a2e; padding: 15px; border-radius: 8px; border: 1px solid #0f3460; }
.lock-indicator { color: #e94560; font-weight: bold; margin: 10px 0; }
.locked { opacity: 0.5; pointer-events: none; }
.alert { padding: 10px; background: #e94560; border-radius: 8px; margin: 10px 0; }
@media (max-width: 768px) { .container { padding: 15px; }; .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container" id="app">
  <!-- Login Section -->
  <div id="loginSection">
    <h1>Bolão Copa do Mundo 2022</h1>
    <h2>Login</h2>
    <input type="text" id="loginUser" placeholder="Usuário">
    <input type="password" id="loginPass" placeholder="Senha">
    <button id="btnLogin" class="btn-success">Entrar</button>
    <button id="btnAdminLogin" class="btn-secondary">Acesso ADM</button>
    <div id="loginError" class="alert" style="display:none;"></div>
  </div>

  <!-- Admin Section -->
  <div id="adminSection" style="display:none;">
    <h1>Painel Administrativo</h1>
    <button id="btnLogoutAdmin" class="btn-danger" style="float:right;">Logout</button>
    <h2>Gerenciar Usuários</h2>
    <div>
      <input type="text" id="newUserName" placeholder="Nome do usuário">
      <input type="password" id="newUserPass" placeholder="Senha (deixe em branco para aleatória)">
      <button id="btnAddUser" class="btn-success">Cadastrar</button>
    </div>
    <table id="userTable">
      <thead><tr><th>Nome</th><th>Ações</th></tr></thead>
      <tbody id="userList"></tbody>
    </table>
    <h2>Resultados dos Jogos</h2>
    <div id="resultsContainer"></div>
    <h2>Bloqueio de Palpites</h2>
    <label><input type="checkbox" id="lockPicksToggle"> Bloquear edição de palpites</label>
  </div>

  <!-- User Section -->
  <div id="userSection" style="display:none;">
    <h1>Bem-vindo, <span id="userNameDisplay"></span></h1>
    <div class="tabs">
      <div class="tab active" data-tab="picks">Meus Palpites</div>
      <div class="tab" data-tab="results">Resultados</div>
      <div class="tab" data-tab="ranking">Ranking</div>
      <div style="flex-grow:1;"></div>
      <button id="btnLogoutUser" class="btn-danger">Logout</button>
    </div>
    <div class="section active" id="tabPicks">
      <div class="lock-indicator" id="lockStatus">Palpites estão desbloqueados</div>
      <div id="picksContainer"></div>
      <button id="btnSavePicks" class="btn-success">Salvar Palpites</button>
    </div>
    <div class="section" id="tabResults">
      <div id="resultsView"></div>
    </div>
    <div class="section" id="tabRanking">
      <table id="rankingTable">
        <thead><tr><th>Posição</th><th>Nome</th><th>Pontos</th><th>Placares Exatos</th></tr></thead>
        <tbody id="rankingBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// Data
const groups = [
  {name:'A', teams:['Holanda','Senegal','Catar','Equador']},
  {name:'B', teams:['Inglaterra','País de Gales','Irã','EUA']},
  {name:'C', teams:['Argentina','Polônia','México','Arábia Saudita']},
  {name:'D', teams:['França','Dinamarca','Tunísia','Austrália']},
  {name:'E', teams:['Espanha','Alemanha','Japão','Costa Rica']},
  {name:'F', teams:['Bélgica','Marrocos','Croácia','Canadá']},
  {name:'G', teams:['Brasil','Suíça','Camarões','Sérvia']},
  {name:'H', teams:['Portugal','Uruguai','Gana','Coreia do Sul']}
];

// Generate matches
let matches = [];
groups.forEach(group => {
  const t = group.teams;
  for (let i=0; i<4; i++) {
    for (let j=i+1; j<4; j++) {
      matches.push({id: matches.length+1, group: group.name, home: t[i], away: t[j], homeGoals: '', awayGoals: ''});
    }
  }
});

// LocalStorage helpers
function getUsers() { return JSON.parse(localStorage.getItem('users') || '[]'); }
function saveUsers(users) { localStorage.setItem('users', JSON.stringify(users)); }
function getUser(user) { const users = getUsers(); return users.find(u => u.username === user); }
function getPicks(username) { return JSON.parse(localStorage.getItem('picks_'+username) || '{}'); }
function savePicks(username, picks) { localStorage.setItem('picks_'+username, JSON.stringify(picks)); }
function getResults() { return JSON.parse(localStorage.getItem('results') || '{}'); }
function saveResults(results) { localStorage.setItem('results', JSON.stringify(results)); }
function isLocked() { return localStorage.getItem('lockPicks') === 'true'; }
function setLocked(val) { localStorage.setItem('lockPicks', val); }

// Initialize default admin if not exists
if (!localStorage.getItem('users')) {
  saveUsers([{username:'ADM', password:'admin', role:'admin'}]);
}

// Global state
let currentUser = null;
let currentRole = null;

// DOM elements
const loginSection = document.getElementById('loginSection');
const adminSection = document.getElementById('adminSection');
const userSection = document.getElementById('userSection');
const loginUser = document.getElementById('loginUser');
const loginPass = document.getElementById('loginPass');
const btnLogin = document.getElementById('btnLogin');
const btnAdminLogin = document.getElementById('btnAdminLogin');
const loginError = document.getElementById('loginError');
const btnLogoutAdmin = document.getElementById('btnLogoutAdmin');
const btnLogoutUser = document.getElementById('btnLogoutUser');
const userNameDisplay = document.getElementById('userNameDisplay');
const userList = document.getElementById('userList');
const newUserName = document.getElementById('newUserName');
const newUserPass = document.getElementById('newUserPass');
const btnAddUser = document.getElementById('btnAddUser');
const lockPicksToggle = document.getElementById('lockPicksToggle');
const resultsContainer = document.getElementById('resultsContainer');
const picksContainer = document.getElementById('picksContainer');
const resultsView = document.getElementById('resultsView');
const rankingBody = document.getElementById('rankingBody');
const lockStatus = document.getElementById('lockStatus');
const btnSavePicks = document.getElementById('btnSavePicks');
const tabs = document.querySelectorAll('.tab');
const sections = document.querySelectorAll('.section');

// Tab switching
tabs.forEach(tab => {
  tab.addEventListener('click', function() {
    tabs.forEach(t => t.classList.remove('active'));
    sections.forEach(s => s.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab'+this.dataset.tab.charAt(0).toUpperCase()+this.dataset.tab.slice(1)).classList.add('active');
    if (this.dataset.tab === 'ranking') updateRanking();
    if (this.dataset.tab === 'results') displayResults();
  });
});

// Login functions
function doLogin(username, password) {
  const users = getUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if (user) {
    currentUser = username;
    currentRole = user.role;
    loginSection.style.display = 'none';
    if (user.role === 'admin') {
      adminSection.style.display = 'block';
      loadAdminPanel();
    } else {
      userSection.style.display = 'block';
      userNameDisplay.textContent = username;
      loadUserPanel();
    }
    loginError.style.display = 'none';
    loginUser.value = '';
    loginPass.value = '';
  } else {
    loginError.textContent = 'Usuário ou senha inválidos';
    loginError.style.display = 'block';
  }
}

btnLogin.addEventListener('click', () => doLogin(loginUser.value, loginPass.value));
btnAdminLogin.addEventListener('click', () => doLogin('ADM', loginPass.value || 'admin'));

// Logout
function logout() {
  currentUser = null;
  currentRole = null;
  adminSection.style.display = 'none';
  userSection.style.display = 'none';
  loginSection.style.display = 'block';
  lockPicksToggle.checked = isLocked();
}

btnLogoutAdmin.addEventListener('click', logout);
btnLogoutUser.addEventListener('click', logout);

// Admin panel
function loadAdminPanel() {
  updateUserTable();
  updateResultsForm();
  lockPicksToggle.checked = isLocked();
}

function updateUserTable() {
  const users = getUsers();
  userList.innerHTML = users.filter(u => u.role !== 'admin').map(u => `<tr><td>${u.username}</td><td><button class="btn-danger btn-sm" onclick="deleteUser('${u.username}')">Deletar</button></td></tr>`).join('');
}

window.deleteUser = function(username) {
  if (confirm('Deletar usuário '+username+'?')) {
    let users = getUsers();
    users = users.filter(u => u.username !== username);
    saveUsers(users);
    localStorage.removeItem('picks_'+username);
    updateUserTable();
  }
}

btnAddUser.addEventListener('click', function() {
  const name = newUserName.value.trim();
  if (!name) { alert('Nome é obrigatório'); return; }
  let pass = newUserPass.value.trim();
  if (!pass) {
    // Generate random 8-char password
    pass = Math.random().toString(36).slice(-8);
  }
  let users = getUsers();
  if (users.find(u => u.username === name)) { alert('Usuário já existe'); return; }
  users.push({username: name, password: pass, role: 'user'});
  saveUsers(users);
  alert('Usuário cadastrado. Senha: '+pass);
  newUserName.value = '';
  newUserPass.value = '';
  updateUserTable();
});

function updateResultsForm() {
  const results = getResults();
  resultsContainer.innerHTML = `<table><thead><tr><th>Jogo</th><th>Placar</th></tr></thead><tbody>${matches.map(m => `<tr><td>${m.id}. ${m.home} x ${m.away}</td><td><input type="number" min="0" class="result-home" data-match="${m.id}" value="${results[m.id]?.homeGoals || ''}"> x <input type="number" min="0" class="result-away" data-match="${m.id}" value="${results[m.id]?.awayGoals || ''}"></td></tr>`).join('')}</tbody></table>`;
  document.querySelectorAll('.result-home, .result-away').forEach(input => {
    input.addEventListener('change', function() {
      const matchId = parseInt(this.dataset.match);
      const home = document.querySelector(`.result-home[data-match="${matchId}"]`).value;
      const away = document.querySelector(`.result-away[data-match="${matchId}"]`).value;
      let results = getResults();
      if (home === '' && away === '') {
        delete results[matchId];
      } else {
        results[matchId] = { homeGoals: parseInt(home) || 0, awayGoals: parseInt(away) || 0 };
      }
      saveResults(results);
    });
  });
}

lockPicksToggle.addEventListener('change', function() {
  setLocked(this.checked);
  if (currentRole === 'user') updateLockStatus();
});

// User panel
function loadUserPanel() {
  updatePicksForm();
  displayResults();
  updateLockStatus();
}

function updateLockStatus() {
  const locked = isLocked();
  lockStatus.textContent = locked ? 'Palpites estão bloqueados (apenas visualização)' : 'Palpites estão desbloqueados';
  lockStatus.style.color = locked ? '#e94560' : '#2ecc71';
  if (currentRole === 'user') {
    const inputs = document.querySelectorAll('#picksContainer input');
    inputs.forEach(inp => inp.disabled = locked);
    btnSavePicks.disabled = locked;
  }
}

function updatePicksForm() {
  const picks = getPicks(currentUser);
  picksContainer.innerHTML = `<table><thead><tr><th>Jogo</th><th>Palpite</th></tr></thead><tbody>${matches.map(m => `<tr><td>${m.id}. ${m.home} x ${m.away}</td><td><input type="number" min="0" class="pick-home" data-match="${m.id}" value="${picks[m.id]?.homeGoals || ''}"> x <input type="number" min="0" class="pick-away" data-match="${m.id}" value="${picks[m.id]?.awayGoals || ''}"></td></tr>`).join('')}</tbody></table>`;
  updateLockStatus();
}

btnSavePicks.addEventListener('click', function() {
  const picks = {};
  document.querySelectorAll('.pick-home').forEach(inp => {
    const matchId = parseInt(inp.dataset.match);
    const home = inp.value;
    const away = document.querySelector(`.pick-away[data-match="${matchId}"]`).value;
    if (home === '' && away === '') {
      delete picks[matchId];
    } else {
      picks[matchId] = { homeGoals: parseInt(home) || 0, awayGoals: parseInt(away) || 0 };
    }
  });
  savePicks(currentUser, picks);
  alert('Palpites salvos!');
});

function displayResults() {
  const results = getResults();
  resultsView.innerHTML = `<table><thead><tr><th>Jogo</th><th>Resultado</th></tr></thead><tbody>${matches.map(m => `<tr><td>${m.id}. ${m.home} x ${m.away}</td><td>${results[m.id] ? results[m.id].homeGoals + ' x ' + results[m.id].awayGoals : '-'}</td></tr>`).join('')}</tbody></table>`;
}

function updateRanking() {
  const users = getUsers().filter(u => u.role !== 'admin');
  const results = getResults();
  const rankings = users.map(u => {
    const picks = getPicks(u.username);
    let points = 0;
    let exact = 0;
    matches.forEach(m => {
      const res = results[m.id];
      const pick = picks[m.id];
      if (res && pick) {
        const resDiff = res.homeGoals - res.awayGoals;
        const pickDiff = pick.homeGoals - pick.awayGoals;
        if (res.homeGoals === pick.homeGoals && res.awayGoals === pick.awayGoals) {
          points += 3;
          exact++;
        } else if (resDiff === pickDiff) {
          points += 1;
        }
      }
    });
    return { username: u.username, points, exact };
  });
  rankings.sort((a,b) => b.points - a.points);
  rankingBody.innerHTML = rankings.map((r, idx) => `<tr><td>${idx+1}</td><td>${r.username}</td><td>${r.points}</td><td>${r.exact}</td></tr>`).join('');
}

// Initial UI state
loginSection.style.display = 'block';
</script>
</body>
</html>
