<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa do Mundo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.container{max-width:1100px;width:100%;padding:20px}
.card{background:#16213e;border-radius:12px;padding:20px;margin-bottom:20px}
.login-box{max-width:400px;margin:80px auto}
h2{text-align:center;margin-bottom:20px;color:#e94560}
input,select,button{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none;font-size:16px}
input,select{background:#0f3460;color:#fff}
button{background:#e94560;color:#fff;cursor:pointer;font-weight:bold}
button:hover{background:#c2314a}
.tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{flex:1;background:#0f3460;padding:12px;text-align:center;cursor:pointer;border-radius:8px;min-width:100px}
.tab-btn.active{background:#e94560}
.tab-content{display:none}
.tab-content.active{display:block}
.game-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #0f3460;flex-wrap:wrap}
.game-row .teams{min-width:180px;font-weight:bold}
.game-row .my-pick{display:flex;gap:5px;align-items:center}
.game-row .my-pick input{width:50px;padding:5px;text-align:center}
.others-scroll{display:flex;gap:8px;overflow-x:auto;flex:1;padding:5px 0}
.other-pick{min-width:70px;background:#0f3460;border-radius:6px;padding:4px 8px;text-align:center;font-size:12px}
.filter-dropdown{max-width:250px;margin-bottom:15px}
.ranking-table{width:100%;border-collapse:collapse}
.ranking-table th,.ranking-table td{padding:8px;text-align:center;border-bottom:1px solid #0f3460}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-content{background:#16213e;padding:30px;border-radius:12px;max-width:450px;width:90%}
@media(max-width:600px){.game-row{flex-direction:column;align-items:stretch}.others-scroll{max-width:100%}}
</style>
</head>
<body>
<div id="app" class="container"></div>
<script>
// ========== DATA ==========
const groups = [
  {group:'A', teams:['Holanda','Senegal','Catar','Equador']},
  {group:'B', teams:['Inglaterra','País de Gales','Irã','EUA']},
  {group:'C', teams:['Argentina','Polônia','México','Arábia Saudita']},
  {group:'D', teams:['França','Dinamarca','Tunísia','Austrália']},
  {group:'E', teams:['Espanha','Alemanha','Japão','Costa Rica']},
  {group:'F', teams:['Bélgica','Marrocos','Croácia','Canadá']},
  {group:'G', teams:['Brasil','Suíça','Camarões','Sérvia']},
  {group:'H', teams:['Portugal','Uruguai','Gana','Coreia do Sul']}
];
const games = [];
groups.forEach(g=>{
  for(let i=0;i<g.teams.length;i++){
    for(let j=i+1;j<g.teams.length;j++){
      games.push({group:g.group,team1:g.teams[i],team2:g.teams[j],id:`${g.group}_${i}_${j}`});
    }
  }
});

// ========== STATE ==========
let currentUser = null;
let users = JSON.parse(localStorage.getItem('bolao_users')) || [];
let picks = JSON.parse(localStorage.getItem('bolao_picks')) || {};
let results = JSON.parse(localStorage.getItem('bolao_results')) || {};
let locked = JSON.parse(localStorage.getItem('bolao_locked')) || false;

function saveUsers(){localStorage.setItem('bolao_users',JSON.stringify(users));}
function savePicks(){localStorage.setItem('bolao_picks',JSON.stringify(picks));}
function saveResults(){localStorage.setItem('bolao_results',JSON.stringify(results));}
function saveLocked(){localStorage.setItem('bolao_locked',JSON.stringify(locked));}

// Helper
function findUser(name){return users.find(u=>u.name===name);}
function genRandomPassword(){return Math.random().toString(36).slice(2,8);}

// ========== RENDER ==========
const app = document.getElementById('app');

function render(){
  if(!currentUser){
    showPublicRanking();
  } else {
    const user = findUser(currentUser);
    if(!user){currentUser=null;render();return;}
    if(user.forceChangePassword){
      showChangePasswordModal();
    } else {
      showUserPanel();
    }
  }
}

function showPublicRanking(){
  const html = `
    <h2>Ranking - Bolão Copa do Mundo</h2>
    <div class="card">
      <h3>Classificação</h3>
      ${rankingTable()}
    </div>
    <div class="card login-box">
      <h2>Login</h2>
      <input type="text" id="loginName" placeholder="Nome">
      <input type="password" id="loginPass" placeholder="Senha">
      <button onclick="login()">Entrar</button>
      <p style="color:#e94560;text-align:center;margin-top:10px;min-height:20px" id="loginError"></p>
    </div>
  `;
  app.innerHTML = html;
}

function login(){
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const user = findUser(name);
  if(!user || user.password !== pass){
    document.getElementById('loginError').textContent = 'Usuário ou senha inválidos';
    return;
  }
  currentUser = name;
  render();
}

function showChangePasswordModal(){
  app.innerHTML = `
    <div class="modal" id="changePassModal">
      <div class="modal-content">
        <h2>Você precisa trocar sua senha</h2>
        <input type="password" id="currentPass" placeholder="Senha Atual">
        <input type="password" id="newPass" placeholder="Nova Senha">
        <input type="password" id="confirmPass" placeholder="Confirmar Nova Senha">
        <button onclick="changePassword()">Alterar Senha</button>
        <p id="passError" style="color:#e94560;text-align:center;margin-top:10px"></p>
      </div>
    </div>
  `;
}

function changePassword(){
  const user = findUser(currentUser);
  const current = document.getElementById('currentPass').value.trim();
  const newPass = document.getElementById('newPass').value.trim();
  const confirm = document.getElementById('confirmPass').value.trim();
  if(current !== user.password){
    document.getElementById('passError').textContent = 'Senha atual incorreta';
    return;
  }
  if(newPass.length < 4){
    document.getElementById('passError').textContent = 'Nova senha deve ter ao menos 4 caracteres';
    return;
  }
  if(newPass !== confirm){
    document.getElementById('passError').textContent = 'Nova senha e confirmação não conferem';
    return;
  }
  user.password = newPass;
  user.forceChangePassword = false;
  saveUsers();
  render();
}

function showUserPanel(){
  const user = findUser(currentUser);
  const isAdmin = currentUser === 'admin';
  let tabs = ['Ranking','Meus Palpites','Resultados'];
  if(isAdmin) tabs.push('Admin');
  const tabLinks = tabs.map(t=>`<div class="tab-btn" onclick="switchTab('${t}')">${t}</div>`).join('');
  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Bem-vindo, ${currentUser}</h2>
      <button onclick="logout()" style="width:auto;padding:8px 20px">Logout</button>
    </div>
    <div class="tabs">${tabLinks}</div>
    <div id="tabContent"></div>
  `;
  switchTab('Ranking');
}

function switchTab(tabName){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  const content = document.getElementById('tabContent');
  if(tabName === 'Ranking') content.innerHTML = rankingSection();
  else if(tabName === 'Meus Palpites') content.innerHTML = myPicksSection();
  else if(tabName === 'Resultados') content.innerHTML = resultsSection();
  else if(tabName === 'Admin') content.innerHTML = adminSection();
}

function rankingSection(){
  return `
    <div class="card">
      <h3>Classificação</h3>
      ${rankingTable()}
    </div>
  `;
}

function rankingTable(){
  const allUsers = users.filter(u=>u.name!=='admin');
  const scores = allUsers.map(u=>{
    let total = 0;
    if(picks[u.name]){
      games.forEach(g=>{
        const userPick = picks[u.name][g.id];
        const official = results[g.id];
        if(userPick && official && userPick.gols1 !== '' && userPick.gols2 !== '' && official.gols1 !== '' && official.gols2 !== ''){
          const up1 = parseInt(userPick.gols1), up2 = parseInt(userPick.gols2);
          const og1 = parseInt(official.gols1), og2 = parseInt(official.gols2);
          if(up1===og1 && up2===og2) total+=3;
          else {
            const uRes = up1>up2?1:(up1===up2?0:-1);
            const oRes = og1>og2?1:(og1===og2?0:-1);
            if(uRes===oRes) total+=1;
          }
        }
      });
    }
    return {name:u.name,score:total};
  });
  scores.sort((a,b)=>b.score-a.score);
  let rows = '<table class="ranking-table"><tr><th>Pos</th><th>Nome</th><th>Pontos</th></tr>';
  scores.forEach((s,i)=>{
    rows+=`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.score}</td></tr>`;
  });
  rows+='</table>';
  return rows;
}

function myPicksSection(){
  const allUsers = users.filter(u=>u.name!=='admin' && u.name!==currentUser);
  let filterDropdown = `
    <select class="filter-dropdown" id="filterUser" onchange="renderPicksTable()">
      <option value="all">Ver todos</option>
      ${allUsers.map(u=>`<option value="${u.name}">${u.name}</option>`).join('')}
    </select>
  `;
  return `${filterDropdown}<div id="picksTable"></div>`;
}

function renderPicksTable(){
  const filter = document.getElementById('filterUser').value;
  const allUsers = users.filter(u=>u.name!=='admin' && u.name!==currentUser);
  const displayedUsers = filter==='all' ? allUsers : allUsers.filter(u=>u.name===filter);
  let html = '';
  games.forEach(g=>{
    const myPick = picks[currentUser] && picks[currentUser][g.id] ? picks[currentUser][g.id] : {gols1:'',gols2:''};
    html += `<div class="game-row">
      <div class="teams">${g.team1} x ${g.team2}</div>
      <div class="my-pick">
        <input type="number" id="my_${g.id}_1" value="${myPick.gols1}" placeholder="0" onchange="saveMyPick('${g.id}',1)">
        <span>x</span>
        <input type="number" id="my_${g.id}_2" value="${myPick.gols2}" placeholder="0" onchange="saveMyPick('${g.id}',2)">
      </div>
      <div class="others-scroll">
        ${displayedUsers.map(u=>{
          const up = picks[u.name] && picks[u.name][g.id] ? picks[u.name][g.id] : {gols1:'',gols2:''};
          return `<div class="other-pick"><div>${u.name}</div><div>${up.gols1!==''?up.gols1:'-'}x${up.gols2!==''?up.gols2:'-'}</div></div>`;
        }).join('')}
      </div>
    </div>`;
  });
  document.getElementById('picksTable').innerHTML = html;
}

function saveMyPick(gameId, side){
  if(locked) {alert('Palpites bloqueados!'); render(); return;}
  const input1 = document.getElementById(`my_${gameId}_1`);
  const input2 = document.getElementById(`my_${gameId}_2`);
  let val1 = input1.value.trim();
  let val2 = input2.value.trim();
  // Keep empty as empty, only if user typed 0 keep 0
  if(val1 === '') val1 = '';
  if(val2 === '') val2 = '';
  if(!picks[currentUser]) picks[currentUser] = {};
  picks[currentUser][gameId] = {gols1:val1, gols2:val2};
  savePicks();
}

function resultsSection(){
  if(currentUser !== 'admin'){
    let html = '<div class="card"><h3>Resultados Oficiais</h3>';
    games.forEach(g=>{
      const r = results[g.id] || {gols1:'',gols2:''};
      html += `<div class="game-row">
        <div class="teams">${g.team1} x ${g.team2}</div>
        <div>${r.gols1!==''?r.gols1:'-'} x ${r.gols2!==''?r.gols2:'-'}</div>
      </div>`;
    });
    html += '</div>';
    return html;
  } else {
    let html = '<div class="card"><h3>Inserir Resultados (Admin)</h3>';
    games.forEach(g=>{
      const r = results[g.id] || {gols1:'',gols2:''};
      html += `<div class="game-row">
        <div class="teams">${g.team1} x ${g.team2}</div>
        <input type="number" id="res_${g.id}_1" value="${r.gols1}" placeholder="0" style="width:60px" onchange="saveResult('${g.id}',1)">
        <span>x</span>
        <input type="number" id="res_${g.id}_2" value="${r.gols2}" placeholder="0" style="width:60px" onchange="saveResult('${g.id}',2)">
      </div>`;
    });
    html += '</div>';
    return html;
  }
}

function saveResult(gameId, side){
  const input1 = document.getElementById(`res_${gameId}_1`);
  const input2 = document.getElementById(`res_${gameId}_2`);
  let val1 = input1.value.trim();
  let val2 = input2.value.trim();
  if(val1 === '') val1 = '';
  if(val2 === '') val2 = '';
  results[gameId] = {gols1:val1, gols2:val2};
  saveResults();
}

function adminSection(){
  let html = `
    <div class="card">
      <h3>Cadastrar Usuário</h3>
      <input type="text" id="newUserName" placeholder="Nome do usuário">
      <button onclick="addUser()">Adicionar</button>
      <p id="adminMsg" style="color:#e94560;margin-top:10px"></p>
    </div>
    <div class="card">
      <h3>Usuários Cadastrados</h3>
      <table class="ranking-table">
        <tr><th>Nome</th><th>Ações</th></tr>
        ${users.filter(u=>u.name!=='admin').map(u=>`
          <tr>
            <td>${u.name}</td>
            <td>
              <button onclick="deleteUser('${u.name}')" style="width:auto;padding:4px 10px;margin-right:5px">Deletar</button>
              <button onclick="resetPassword('${u.name}')" style="width:auto;padding:4px 10px">Reset Senha</button>
            </td>
          </tr>
        `).join('')}
      </table>
    </div>
    <div class="card">
      <h3>Bloqueio de Palpites</h3>
      <label><input type="checkbox" id="lockCheck" ${locked?'checked':''} onchange="toggleLock()"> Bloquear palpites</label>
    </div>
  `;
  return html;
}

function addUser(){
  const name = document.getElementById('newUserName').value.trim();
  if(!name) {document.getElementById('adminMsg').textContent='Nome inválido'; return;}
  if(findUser(name)) {document.getElementById('adminMsg').textContent='Usuário já existe'; return;}
  const pass = genRandomPassword();
  users.push({name:name, password:pass, forceChangePassword:true});
  saveUsers();
  document.getElementById('adminMsg').textContent=`Usuário criado. Senha: ${pass}`;
  render();
}

function deleteUser(name){
  users = users.filter(u=>u.name!==name);
  delete picks[name];
  saveUsers(); savePicks();
  render();
}

function resetPassword(name){
  const user = findUser(name);
  if(!user) return;
  const newPass = genRandomPassword();
  user.password = newPass;
  user.forceChangePassword = true;
  saveUsers();
  alert(`Nova senha para ${name}: ${newPass}`);
  render();
}

function toggleLock(){
  locked = document.getElementById('lockCheck').checked;
  saveLocked();
}

function logout(){
  currentUser = null;
  render();
}

// ========== INIT ==========
// Ensure admin exists
if(!findUser('admin')){
  users.push({name:'admin',password:'admin',forceChangePassword:false});
}
// For testing, add a user if none
if(users.filter(u=>u.name!=='admin').length===0){
  users.push({name:'teste',password:'1234',forceChangePassword:true});
}
saveUsers();
render();
</script>
</body>
</html>
